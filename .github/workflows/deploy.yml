name: Deploy TAWJIH.AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build shared packages
        run: |
          npm run build -w packages/shared
          npm run build -w packages/ui
          npm run build -w packages/ai

      - name: Build web
        run: npm run build -w apps/web

      - name: Build admin
        run: npm run build -w apps/admin

      - name: Build API
        run: npm run build -w apps/api

  deploy:
    needs: lint-test-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy API to Cloudflare Workers
        run: npm run deploy -w apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Web to Cloudflare Pages
        run: npx wrangler pages deploy apps/web/dist --project-name=tawjih-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Admin to Cloudflare Pages
        run: npx wrangler pages deploy apps/admin/dist --project-name=tawjih-admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Run D1 migrations
        run: npx wrangler d1 migrations apply tawjih-db --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
